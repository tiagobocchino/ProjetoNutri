services:
  - type: web
    name: projetonutri
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start -- --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
